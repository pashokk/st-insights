<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#0d1a4a"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4759FF"/>
      <stop offset="100%" style="stop-color:#9b27af"/>
    </linearGradient>
    <linearGradient id="play" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
    <linearGradient id="star1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Phone/ad frame -->
  <rect x="120" y="80" width="272" height="352" rx="28" fill="#ffffff10" stroke="#4759FF" stroke-width="3"/>

  <!-- Ad screen -->
  <rect x="140" y="100" width="232" height="200" rx="12" fill="url(#screen)" opacity="0.9"/>

  <!-- Play button glow -->
  <circle cx="256" cy="200" r="52" fill="#ffffff18" filter="url(#glow)"/>
  <!-- Play button -->
  <circle cx="256" cy="200" r="40" fill="url(#play)"/>
  <polygon points="246,184 246,216 278,200" fill="#fff"/>

  <!-- Film strip holes top -->
  <rect x="148" y="106" width="14" height="14" rx="3" fill="#ffffff30"/>
  <rect x="170" y="106" width="14" height="14" rx="3" fill="#ffffff30"/>
  <rect x="192" y="106" width="14" height="14" rx="3" fill="#ffffff30"/>
  <rect x="214" y="106" width="14" height="14" rx="3" fill="#ffffff30"/>
  <rect x="236" y="106" width="14" height="14" rx="3" fill="#ffffff30"/>
  <rect x="258" y="106" width="14" height="14" rx="3" fill="#ffffff30"/>
  <rect x="280" y="106" width="14" height="14" rx="3" fill="#ffffff30"/>
  <rect x="302" y="106" width="14" height="14" rx="3" fill="#ffffff30"/>
  <rect x="324" y="106" width="14" height="14" rx="3" fill="#ffffff30"/>
  <rect x="346" y="106" width="14" height="14" rx="3" fill="#ffffff30"/>

  <!-- CTA button bar -->
  <rect x="156" y="316" width="200" height="36" rx="10" fill="#4759FF"/>
  <rect x="172" y="325" width="100" height="10" rx="5" fill="#ffffff60"/>
  <rect x="172" y="339" width="70" height="7" rx="3" fill="#ffffff30"/>

  <!-- Network badge -->
  <rect x="156" y="360" width="80" height="22" rx="6" fill="#FFD70030"/>
  <rect x="162" y="365" width="50" height="8" rx="4" fill="#FFD700"/>
  <rect x="162" y="377" width="35" height="5" rx="2" fill="#FFD70060"/>

  <!-- Stars top right -->
  <text x="370" y="150" font-size="32" fill="url(#star1)" filter="url(#glow)">★</text>
  <text x="392" y="175" font-size="22" fill="#9b27af" opacity="0.8">★</text>
  <text x="352" y="172" font-size="18" fill="#4759FF" opacity="0.7">★</text>

  <!-- Sparkles bottom left -->
  <circle cx="148" cy="290" r="5" fill="#FFD700" filter="url(#glow)"/>
  <circle cx="138" cy="270" r="3" fill="#FF6B35"/>
  <circle cx="160" cy="268" r="4" fill="#4759FF"/>

  <!-- Signal bars (impression share) bottom right -->
  <rect x="362" y="370" width="10" height="18" rx="3" fill="#4759FF" opacity="0.5"/>
  <rect x="376" y="360" width="10" height="28" rx="3" fill="#4759FF" opacity="0.75"/>
  <rect x="390" y="348" width="10" height="40" rx="3" fill="#4759FF"/>
</svg>
